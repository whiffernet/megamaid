name: ci
on:
  pull_request:
  push:
    branches: [main]

# Lighter CI for a public skill/template/MCP repo (no test suite).
# Jobs: lint, format, secret-scan, codeql, typecheck.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3
        with: { args: "format --check" }

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - name: gitleaks (pinned + checksum-verified)
        run: |
          VER=8.21.2
          SHA=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install playwright httpx pydantic click fastmcp mypy
      - run: mypy mcp/ templates/ --ignore-missing-imports
